<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Edit Student</h2>

    <form action="/update_student/{{ student.ID }}" method="POST">
        <input type="text" name="name" value="{{ student.Name }}" class="form-control mb-3" required>
        <input type="text" name="class" value="{{ student.Class }}" class="form-control mb-3" required>
        <input type="number" name="age" value="{{ student.Age }}" class="form-control mb-3" required>
        <button class="btn btn-primary">Update</button>
        <a href="/students" class="btn btn-secondary">Cancel</a>
    </form>

</div>

</body>
</html>
