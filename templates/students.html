<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Students</h2>

    <a href="/dashboard" class="btn btn-secondary">Back</a>

    <div class="card p-3 mt-3">
        <form action="/add_student" method="POST">
            <div class="row">
                <div class="col">
                    <input type="text" name="name" class="form-control" placeholder="Name" required>
                </div>
                <div class="col">
                    <input type="text" name="class" class="form-control" placeholder="Class" required>
                </div>
                <div class="col">
                    <input type="number" name="age" class="form-control" placeholder="Age" required>
                </div>
                <div class="col">
                    <button class="btn btn-success w-100">Add</button>
                </div>
            </div>
        </form>
    </div>

    <table class="table table-striped mt-4">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Age</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.ID }}</td>
            <td>{{ student.Name }}</td>
            <td>{{ student.Class }}</td>
            <td>{{ student.Age }}</td>
            <td>
                <a href="/edit_student/{{ student.ID }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete_student/{{ student.ID }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
